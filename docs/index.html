<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ubuntucare.africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tail-container { @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap'); }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-white min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-emerald-100">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Replace this src with their real logo later -->
                <div class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold logo-font">U</div>
                <div>
                    <h1 class="text-2xl font-bold text-emerald-800 logo-font tracking-tight">UbuntuCare</h1>
                    <p class="text-[10px] text-emerald-600 -mt-1">.africa</p>
                </div>
            </div>
            <p class="text-sm text-emerald-700 font-medium">Healthcare That Cares • Access That Works</p>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-semibold text-gray-900">Patient Registration</h2>
            <p class="text-emerald-700 mt-2">Tell us about yourself — we'll connect you with trusted care fast.</p>
        </div>

        <form id="registerForm" class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-emerald-100">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" id="name" required class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition">
                </div>
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address <span class="text-red-500">*</span></label>
                    <input type="email" id="email" required class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6 mt-6">
                <!-- State -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">State <span class="text-red-500">*</span></label>
                    <input type="text" id="state" placeholder="e.g. FCT Abuja" required class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition">
                </div>
                <!-- City -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">City <span class="text-red-500">*</span></label>
                    <input type="text" id="city" placeholder="e.g. Abuja" required class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition">
                </div>
            </div>

            <!-- Medical Conditions -->
            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Medical Conditions or Known Issues</label>
                <textarea id="conditions" rows="3" placeholder="Diabetes, hypertension, injury, etc." class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition"></textarea>
            </div>

            <!-- Description -->
            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Describe your medical challenges <span class="text-red-500">*</span></label>
                <textarea id="description" rows="5" required placeholder="What symptoms are you experiencing? How long? Any previous treatment?" class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-emerald-500 transition"></textarea>
            </div>

            <!-- Image Upload -->
            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Upload images of the problem (optional but helpful)</label>
                <input type="file" id="images" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-medium file:bg-emerald-100 file:text-emerald-700 hover:file:bg-emerald-200 cursor-pointer">
                <div id="preview" class="mt-4 grid grid-cols-3 gap-3"></div>
            </div>

            <button type="submit" class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl text-lg transition shadow-lg shadow-emerald-200 flex items-center justify-center gap-3">
                <i class="fas fa-heart"></i>
                Submit Registration & Connect to Care
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-8">Your data is safe with us • 24/7 support available after registration</p>
    </div>

    <script>
        // Tailwind script
        tailwind.config = { content: ["*"], theme: { extend: {} } }

        // Image preview
        const imageInput = document.getElementById('images');
        const preview = document.getElementById('preview');

        imageInput.addEventListener('change', () => {
            preview.innerHTML = '';
            for (let file of imageInput.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<img src="${e.target.result}" class="w-full h-28 object-cover rounded-2xl shadow">`;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            alert(`Thank you, ${name}! 🎉\n\nYour registration has been received.\nA care advisor from Ubuntucare.africa will contact you within 24 hours.\n\n(For the job test — this would normally save to their database)`);
            this.reset();
            preview.innerHTML = '';
        });
    </script>
</body>
</html>
